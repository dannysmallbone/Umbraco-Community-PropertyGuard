name: Publish to NuGet

on:
  push:
    tags:
      - 'v*.*.*'

# Required secret: NUGET_API_KEY
# Add via GitHub → Settings → Secrets and variables → Actions → New repository secret

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore PropertyGuard.Tests/PropertyGuard.Tests.csproj

      - name: Build
        run: dotnet build PropertyGuard.Tests/PropertyGuard.Tests.csproj --no-restore --configuration Release /p:TreatWarningsAsErrors=true

      - name: Test
        run: dotnet test PropertyGuard.Tests/PropertyGuard.Tests.csproj --no-build --configuration Release

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Frontend build
        working-directory: PropertyGuard/Client
        run: npm ci && npm run build

      - name: Pack
        run: dotnet pack PropertyGuard/PropertyGuard.csproj --no-build --configuration Release --output ./nupkg /p:Version=${GITHUB_REF_NAME#v}

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }}
